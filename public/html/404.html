<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 • Nestify</title>
<link rel="icon" type="image/svg+xml"
href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><path fill='%23FF385C' d='M512 64c0-17.7-14.3-32-32-32H331.9c-10 0-19.6 4-26.6 11L32 316.3c-42.7 42.7-42.7 111.9 0 154.7s111.9 42.7 154.7 0L460 197.6c7-7 11-16.6 11-26.6V64z'/></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link rel="stylesheet" href="/css/404.css">
</head>
<body>
<div class="error-wrapper">
    <div class="error-card">
        <div class="brand-icon">
            <i class="fa-solid fa-feather-pointed"></i>
        </div>
        <h1 class="error-code">404</h1>
        <h2 class="error-title">
            This nest seems empty
        </h2>
        <p class="error-description">
            The place you're looking for may have been removed,
            renamed, or temporarily unavailable.
        </p>
        <form action="/listing/search" method="GET" class="error-search">
            <input
                type="text"
                name="q"
                placeholder="Search destinations..."
                class="search-input"
                required>
            <button class="search-btn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </form>
        <div class="error-actions">
            <a href="/listing" class="btn-primary">
                Explore Listings
            </a>
            <button onclick="history.back()" class="btn-secondary">
                Go Back
            </button>
        </div>
        <div class="error-help">
            <span>Still lost?</span>
            <a href="/support">
                Contact Support
            </a>
        </div>
    </div>
</div>
</body>
</html>
