<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nestify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/css/404.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><path fill='%23FF385C' d='M512 64c0-17.7-14.3-32-32-32H331.9c-10 0-19.6 4-26.6 11L32 316.3c-42.7 42.7-42.7 111.9 0 154.7s111.9 42.7 154.7 0L460 197.6c7-7 11-16.6 11-26.6V64z'/></svg>">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100 p-3">

    <div class="error-card">
        <div class="brand-blob">
            <i class="fa-solid fa-feather-pointed fa-2x text-white"></i>
        </div>

        <h1 class="error-code">404</h1>
        <h2 class="h5 fw-bold text-dark mt-2">This nest is empty</h2>
        <p class="text-muted mb-4 small">
            The property you're looking for has flown away.
        </p>

        <div class="d-flex flex-column flex-sm-row justify-content-center gap-2">
            <a href="/listing" class="btn-rose">Return Home</a>
            <a href="/search" class="btn-rose btn-outline browse">Browse Stays</a>
        </div>

        <div class="mt-4 pt-3 border-top">
            <p class="small text-secondary mb-0">
                Need help? <a href="/support" class="text-rose text-decoration-none fw-bold">Contact Support</a>
            </p>
        </div>
    </div>

</body>
</html>
